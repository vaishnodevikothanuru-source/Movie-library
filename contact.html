<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#111;
color:white;
animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

header{
animation:headerGlow 2s infinite alternate;
}

@keyframes headerGlow{
from{
box-shadow:0 0 10px #e50914;
}
to{
box-shadow:0 0 25px #ff2d2d;
}
}

form{
background:#1c1c1c;
padding:25px;
border-radius:10px;
animation:formSlide 0.8s ease;
}


@keyframes formSlide{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}


.form-control:focus{
box-shadow:0 0 10px #e50914;
border-color:#e50914;
}


.btn-send{
background:#e50914;
border:none;
color:white;
transition:0.3s;
}


.btn-send:hover{
background:#c40812;
transform:scale(1.1);
}

.btn-send:active{
transform:scale(0.9);
}


.nav-link{
transition:0.3s;
}

.nav-link:hover{
color:#ff4d4d;
transform:scale(1.1);
}


footer{
background:#222;
}
</style>

</head>

<body>


<header class="bg-danger text-center p-4 fs-3 fw-bold">
📩 Contact Us
</header>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#">Library</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="home.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="movie index.html">Movies</a>
</li>

<li class="nav-item">
<a class="nav-link" href="webseries.html">Web Series</a>
</li>

<li class="nav-item">
<a class="nav-link" href="anime.html">Anime</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">

</li>

<li class="nav-item">
<a class="nav-link" href="contact.html">Contact</a>
</li>

</ul>

</div>
</div>
</nav>


<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<h2 class="mb-4 text-center">Send Us a Message</h2>

<form onsubmit="submitForm(event)">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4" required></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-send">
Send Message
</button>
</div>

</form>

</div>
</div>

</div>


<footer class="text-center text-light p-3 mt-5">
