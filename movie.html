<!DOCTYPE html>
<html lang="en">
<head>

<title>My Movie Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#111;
color:white;
animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:#1c1c1c;
color:white;
transition:transform 0.4s, box-shadow 0.4s;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.8);
}


.card img{
transition:transform 0.5s;
}

.card:hover img{
transform:scale(1.1);
}


.btn-fav{
background:#e50914;
color:white;
border:none;
transition:0.3s;
}


.btn-fav:hover{
background:#c40812;
transform:scale(1.1);
}


.btn-fav:active{
transform:scale(0.9);
}

.nav-link{
transition:0.3s;
}

.nav-link:hover{
color:#ff4d4d;
transform:scale(1.1);
}


.movie-card{
animation:slideUp 0.8s ease forwards;
}


@keyframes slideUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}


header{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 10px #e50914;
}
to{
box-shadow:0 0 25px #ff2d2d;
}
}
</style>

</head>
