<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Genres - My Movie Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#111;
color:white;
animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

header{
animation:headerGlow 2s infinite alternate;
}

@keyframes headerGlow{
from{
box-shadow:0 0 10px #e50914;
}
to{
box-shadow:0 0 25px #ff2d2d;
}
}

.card{
background:#1c1c1c;
color:white;
transition:transform 0.4s, box-shadow 0.4s, background 0.4s;
border:none;
animation:cardSlide 0.8s ease forwards;
}

@keyframes cardSlide{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
background:#e50914;
transform:translateY(-10px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.8);
}

.btn-danger{
transition:0.3s;
}

.btn-danger:hover{
transform:scale(1.1);
}


footer{
background:#222;
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="bg-danger text-center p-4 fs-3 fw-bold">
🎬 Movie Genres & Languages
</header>

<div class="container mt-5">

<!-- MOVIE GENRES -->
<h2 class="text-danger mb-4">🎭 Movie Genres</h2>

<div class="row g-3">

<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Action</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Adventure</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Comedy</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Drama</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Horror</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Romance</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Sci-Fi</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Thriller</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Fantasy</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Mystery</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Animation</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Documentary</div></div>

</div>

<!-- MOVIES BY LANGUAGE -->
<h2 class="text-danger mt-5 mb-4">🌍 Movies by Language</h2>

<div class="row g-3">

<div class="col-md-3 col-sm-6"><div class="card text-center p-3">English</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Hindi</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Spanish</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">French</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Korean</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Japanese</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Chinese</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Tamil</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Telugu</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">German</div></div>
<div class="col-md-3 col-sm-6"><div class="card text-center p-3">Italian</div></div>

</div>

<!-- BACK BUTTON -->
<div class="text-center mt-5">
<a href="index.html" class="btn btn-danger">⬅ Back to Home</a>
</div>

</div>

<footer class="text-center text-light p-3 mt-5">

</body>
